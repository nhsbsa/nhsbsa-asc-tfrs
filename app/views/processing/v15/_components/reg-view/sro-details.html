<h2 class="govuk-heading-m">SRO details</h2>
<dl class="govuk-summary-list">
    <div class="govuk-summary-list__row">
        <dt class="govuk-summary-list__key">
            Full name
        </dt>
        <dd class="govuk-summary-list__value">
            {{reg.SRO.givenName}} {{reg.SRO.familyName}}
        </dd>
    </div>
    <div class="govuk-summary-list__row">
        <dt class="govuk-summary-list__key">
            Email address
        </dt>
        <dd class="govuk-summary-list__value">
            {{reg.SRO.email}}
        </dd>
    </div>
    <div class="govuk-summary-list__row">
        <dt class="govuk-summary-list__key">
            Phone number
        </dt>
        <dd class="govuk-summary-list__value">
            {{reg.SRO.phonenumber}}
        </dd>
    </div>
</dl>
